partner: costco
display_name: "Costco"
description: "Costco item setup workbook requirements"

required_fields:
  - name: product_name
    required: true
  - name: brand
    required: true
  - name: upc
    required: true
    format_pattern: "^\\d{14}$"
    format_description: "14-digit case-level GTIN (indicator digit 1-8)"
  - name: case_gross_weight_lb
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric weight in pounds"
  - name: case_length_in
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric length in inches"
  - name: case_width_in
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric width in inches"
  - name: case_height_in
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric height in inches"
  - name: case_pack_qty
    required: true
    format_pattern: "^\\d+$"
    format_description: "Whole number"
  - name: inner_pack_count
    required: true
    format_pattern: "^\\d+$"
    format_description: "Whole number"
  - name: club_pack_length_in
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric length in inches"
  - name: club_pack_width_in
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric width in inches"
  - name: club_pack_height_in
    required: true
    format_pattern: "^\\d+\\.?\\d*$"
    format_description: "Numeric height in inches"
  - name: country_of_origin
    required: true
  - name: category
    required: true
  - name: product_description
    required: true
  - name: shelf_life_days
    required: true
    format_pattern: "^\\d+$"
    format_description: "Whole number of days"

conditional_rules:
  - trigger_field: storage_type
    trigger_value: "Refrigerated"
    required_fields:
      - temp_min
      - temp_max
  - trigger_field: storage_type
    trigger_value: "Frozen"
    required_fields:
      - temp_min
      - temp_max
  - trigger_field: club_membership_tier
    trigger_value: "Executive"
    required_fields:
      - executive_member_price
      - executive_discount_pct

gtin_hierarchy:
  expected_level: "case"
  expected_formats:
    - "GTIN-14"
    - "ITF-14"
